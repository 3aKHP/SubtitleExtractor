name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # CI 无 GPU，用 CPU 版 onnxruntime；rapidocr 会自动选 CPUExecutionProvider
          pip install \
            onnxruntime \
            rapidocr-onnxruntime==1.2.3 \
            "opencv-python>=4.10.0" \
            pypinyin \
            jieba \
            pytest \
            pytest-cov \
            httpx \
            fastapi \
            "pydantic>=2.0" \
            "numpy>=2.0"

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --extend-ignore=E501,W503

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
