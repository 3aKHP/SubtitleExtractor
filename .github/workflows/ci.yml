name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            tomli \
            pypinyin \
            jieba \
            pytest \
            pytest-cov \
            httpx \
            fastapi \
            pydantic \
            numpy

      - name: Lint (flake8)
        run: |
          pip install flake8
          # E501: 行长度，项目里有长注释，暂不强制
          # W503: 二元运算符换行风格，与 black 冲突
          flake8 app/ --max-line-length=120 --extend-ignore=E501,W503

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
