name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # CI 只跑轻量单元测试，不初始化 PaddleOCR/ASR 模型。
          pip install \
            "opencv-python>=4.10.0" \
            pypinyin \
            jieba \
            pytest \
            pytest-cov \
            httpx \
            fastapi \
            uvicorn \
            "pydantic>=2.0" \
            "numpy>=2.0" \
            tqdm

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 app/core app/main.py app/server.py scripts --select=F

      - name: Static entrypoint checks
        run: |
          python -m compileall -q app tests scripts
          python app/main.py --help
          python scripts/benchmark_runtime.py --help
          python scripts/smoke_server.py --help

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
